<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Happy Birthday ✨</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      position: relative;
      height: 100vh;
      overflow: hidden;
      background: linear-gradient(135deg, #0a0014, #140024, #1f0033, #2a0044);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
    }

    .container {
      text-align: center;
      position: relative;
      z-index: 2;
    }

    .card {
      padding: 40px 60px;
      border-radius: 25px;
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(25px);
      border: 1px solid rgba(255, 255, 255, 0.12);
      box-shadow: 0 10px 50px rgba(0,0,0,0.6);
      transform: translateY(40px);
      opacity: 0;
      animation: fadeUp 1.5s ease forwards;
    }

    h1 {
      font-size: 3rem;
      font-weight: 600;
      margin-bottom: 10px;
      background: linear-gradient(90deg, #d8b4fe, #f5d0fe);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    p {
      font-weight: 300;
      font-size: 1.2rem;
      opacity: 0.85;
    }

    .button {
      margin-top: 25px;
      padding: 12px 30px;
      border-radius: 50px;
      border: none;
      background: linear-gradient(90deg, #c084fc, #e879f9);
      color: white;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .button:hover {
      transform: scale(1.08);
      box-shadow: 0 0 25px rgba(216,180,254,0.6);
    }

    @keyframes fadeUp {
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    /* snow */
    .snow {
      position: fixed;
      position: absolute;
      color: white;
      user-select: none;
      pointer-events: none;
      animation-name: snowfall;
      animation-timing-function: linear;
      animation-iteration-count: infinite;
    }

    @keyframes snowfall {
      from {
        transform: translateY(-10vh) rotate(0deg);
        opacity: 0;
      }
      10% {
        opacity: 1;
      }
      to {
        transform: translateY(110vh) rotate(360deg);
        opacity: 0;
      }
    }

    .message {
      margin-top: 20px;
      opacity: 0;
      transition: opacity 1s ease;
    }

    .message.show {
      opacity: 1;
    }

  </style>
</head>
<body>

  <div class="container">
    <div class="card">
      <h1 id="title">Happy Birthday</h1>
      <p>In this beautiful purple night 💜</p>
      <button class="button" onclick="showMessage()">Open Gift</button>
      <div class="message" id="message">
        <p>You deserve happiness, always. 🎂✨</p>
      </div>
    </div>
  </div>

  <script>

    // snow + cakes
    const items = ["❄", "❄", "❄", "🎂", "🧁"];

    for (let i = 0; i < 60; i++) {
      const snow = document.createElement('div');
      snow.className = 'snow';
      snow.innerHTML = items[Math.floor(Math.random() * items.length)];

      snow.style.left = Math.random() * 100 + 'vw';
      snow.style.top = '-10vh';
      snow.style.fontSize = (Math.random() * 20 + 10) + 'px';

      snow.style.animationDuration = (Math.random() * 10 + 10) + 's';
      snow.style.animationDelay = Math.random() * 5 + 's';

      document.body.appendChild(snow);
    }

    // typing animation
    const text = "Happy Birthday";
    const title = document.getElementById('title');
    let index = 0;
    title.textContent = '';

    function type() {
      if (index < text.length) {
        title.textContent += text[index];
        index++;
        setTimeout(type, 100);
      }
    }

    setTimeout(type, 800);

    function showMessage() {
      document.getElementById('message').classList.add('show');
    }

  </script>

</body>
</html>
